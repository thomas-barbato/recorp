{% load static %}
{% load i18n %}

<div id="group-modal" class="fixed inset-0 modal-z-index hidden bg-black/70 backdrop-blur-md flex md:items-center md:justify-center md:p-2">
    <div id="holo-ring" class="absolute inset-0 rounded-2xl pointer-events-none glow-ring"></div>

    <div id="group-modal-content" class="modal-animated-panel relative shadow-2xl md:w-[60vw] md:max-w-2xl md:h-[80vh] w-full h-full flex flex-col md:overflow-hidden transition-all bg-zinc-950/95 border md:border border-emerald-500/40 md:rounded-2xl shadow-[0_0_30px_rgba(10,185,129,0.4)] transform scale-90 opacity-0 duration-500 ease-out overflow-hidden backdrop-saturate-150 backdrop-brightness-125">
        <div class="flex justify-between items-center px-5 py-4 border-b border-emerald-500/40 bg-gradient-to-r from-emerald-900/60 to-zinc-900/60 shadow-inner">
            <h2 class="font-orbitron text-emerald-400 text-xl md:text-2xl font-bold uppercase tracking-widest flex items-center gap-3">
                <span class="group-action-icon-mask action-icon-mask inline-block w-7 h-7 text-emerald-300" aria-hidden="true"></span>
                {% translate "Group Management" %}
            </h2>
            <button class="text-emerald-400 hover:text-red-400 text-2xl transition-all duration-200" type="button">
                <i id="close-group-modal" class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div id="group-modal-toast" class="hidden mx-4 mt-3 rounded-md border px-3 py-2 text-xs font-semibold"></div>

        <div id="group-modal-invitations" class="hidden p-4 border-b border-emerald-500/20 bg-zinc-950/60">
            <fieldset class="w-full border border-emerald-400/30 rounded-xl bg-emerald-900/20 p-3 shadow-inner shadow-emerald-900/20">
                <legend class="text-sm uppercase tracking-wider font-bold text-emerald-300 bg-emerald-950/60 border border-emerald-400/40 rounded-md px-2 py-1 shadow-sm font-orbitron">
                    {% translate "Pending Invitations" %}
                </legend>
                <div id="group-modal-invitations-list" class="flex flex-col gap-2 text-xs"></div>
            </fieldset>
        </div>

        <div id="group-modal-invite-section" class="p-4 border-b border-emerald-500/20 bg-zinc-950/60">
            <fieldset class="w-full border border-emerald-400/30 rounded-xl bg-emerald-900/20 p-3 shadow-inner shadow-emerald-900/20">
                <legend class="text-sm uppercase tracking-wider font-bold text-emerald-300 bg-emerald-950/60 border border-emerald-400/40 rounded-md px-2 py-1 shadow-sm font-orbitron">
                    {% translate "Invite Player" %}
                </legend>
                <div class="flex flex-col md:flex-row gap-2">
                    <div class="relative flex-1">
                        <input id="group-invite-player-name" type="text" autocomplete="off" class="w-full bg-zinc-800/60 border border-emerald-500/30 rounded px-3 py-2 text-emerald-300 text-sm" placeholder="{% translate 'Player name...' %}">
                        <input id="group-invite-player-id" type="hidden">
                        <div id="group-invite-autocomplete" class="hidden absolute left-0 right-0 mt-1 z-[12000] max-h-48 overflow-y-auto rounded border border-emerald-500/20 bg-zinc-900/95 shadow-lg"></div>
                    </div>
                    <button id="group-invite-send-btn" type="button" class="shrink-0 px-4 py-2 rounded border border-emerald-400/50 text-emerald-300 hover:text-emerald-200 hover:border-emerald-300 hover:bg-emerald-400/10 transition text-sm font-semibold">
                        {% translate "Send Invite" %}
                    </button>
                </div>
                <div id="group-invite-hint" class="mt-2 text-xs text-emerald-300/70"></div>
            </fieldset>
        </div>

        <div class="flex-1 overflow-y-auto thin-semi-transparent-scrollbar p-4 space-y-3 text-sm md:text-base relative">
            <fieldset class="w-full border border-emerald-400/30 rounded-xl bg-emerald-900/20 p-3 shadow-inner shadow-emerald-900/20">
                <legend class="text-sm uppercase tracking-wider font-bold text-emerald-300 bg-emerald-950/60 border border-emerald-400/40 rounded-md px-2 py-1 shadow-sm font-orbitron inline-flex items-center gap-2">
                    <span>{% translate "Group" %}</span>
                    <span id="group-modal-member-count" class="text-[0.68rem] font-semibold tracking-normal text-emerald-200 border border-emerald-400/40 rounded px-1.5 py-0.5 bg-emerald-900/35">
                        0/6
                    </span>
                </legend>
                <p id="group-modal-empty-state" class="text-sm text-emerald-200/80">{% translate "You are not part of a group." %}</p>
                <div id="group-modal-members" class="hidden flex flex-col gap-2"></div>
            </fieldset>
        </div>

        <div class="shrink-0 border-t border-emerald-800/30 bg-black/40 backdrop-blur-sm flex flex-wrap justify-center items-center py-3 px-4 gap-2">
            <button id="group-leave-btn" type="button" class="hidden font-shadow text-amber-300 font-bold rounded-md border border-amber-500/50 px-4 py-2 hover:text-amber-200 hover:border-amber-300 transition-all">
                {% translate "Leave Group" %}
            </button>
            <button id="group-disband-btn" type="button" class="hidden font-shadow text-red-400 font-bold rounded-md border border-red-500/50 px-4 py-2 hover:text-red-300 hover:border-red-300 transition-all">
                {% translate "Disband Group" %}
            </button>
            <button id="close-group-modal-bottom" type="button" class="font-shadow text-emerald-400 font-bold rounded-md border border-emerald-500/50 px-6 py-2.5 hover:text-emerald-200 hover:border-emerald-300 hover:scale-105 transition-all">
                {% translate "Close" %}
            </button>
        </div>
    </div>
</div>
